aid: elastic-stack
name: Elastic Stack
description: The Elastic Stack (formerly known as the ELK Stack) is a collection of
  open-source products from Elastic designed to help users take data from any source,
  in any format, and search, analyze, and visualize that data in real-time. The stack
  includes Elasticsearch for search and analytics, Kibana for visualization, Logstash
  for data processing, and Beats for data shipping.
type: Index
