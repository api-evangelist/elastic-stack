naftiko: 1.0.0-alpha2
info:
  label: Elasticsearch API
  description: 'Elasticsearch API. 10 operations. Lead operation: Bulk operations. Self-contained Naftiko capability covering
    one Elastic Stack business surface.'
  tags:
  - Elastic Stack
  - Elasticsearch API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELASTIC_STACK_API_KEY: ELASTIC_STACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: elastic-stack
    baseUri: https://localhost:9200
    description: Elasticsearch API business capability. Self-contained, no shared references.
    resources:
    - name: _bulk
      path: /_bulk
      operations:
      - name: bulkoperations
        method: POST
        description: Bulk operations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: _cluster-health
      path: /_cluster/health
      operations:
      - name: getclusterhealth
        method: GET
        description: Get cluster health
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: index
      path: /{index}
      operations:
      - name: createindex
        method: PUT
        description: Create index
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteindex
        method: DELETE
        description: Delete index
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: index-_doc-id
      path: /{index}/_doc/{id}
      operations:
      - name: getdocument
        method: GET
        description: Get document by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: putdocument
        method: PUT
        description: Index document with explicit ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletedocument
        method: DELETE
        description: Delete document by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: index-_search
      path: /{index}/_search
      operations:
      - name: searchindexget
        method: GET
        description: Search documents in an index
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchindexpost
        method: POST
        description: Search documents in an index with request body
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: index-_settings
      path: /{index}/_settings
      operations:
      - name: getindexsettings
        method: GET
        description: Get index settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: elastic-stack-rest
    port: 8080
    description: REST adapter for Elasticsearch API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/bulk
      name: bulk
      description: REST surface for _bulk.
      operations:
      - method: POST
        name: bulkoperations
        description: Bulk operations
        call: elastic-stack.bulkoperations
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cluster/health
      name: cluster-health
      description: REST surface for _cluster-health.
      operations:
      - method: GET
        name: getclusterhealth
        description: Get cluster health
        call: elastic-stack.getclusterhealth
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{index}
      name: index
      description: REST surface for index.
      operations:
      - method: PUT
        name: createindex
        description: Create index
        call: elastic-stack.createindex
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteindex
        description: Delete index
        call: elastic-stack.deleteindex
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{index}/doc/{id}
      name: index-doc-id
      description: REST surface for index-_doc-id.
      operations:
      - method: GET
        name: getdocument
        description: Get document by ID
        call: elastic-stack.getdocument
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putdocument
        description: Index document with explicit ID
        call: elastic-stack.putdocument
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedocument
        description: Delete document by ID
        call: elastic-stack.deletedocument
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{index}/search
      name: index-search
      description: REST surface for index-_search.
      operations:
      - method: GET
        name: searchindexget
        description: Search documents in an index
        call: elastic-stack.searchindexget
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: searchindexpost
        description: Search documents in an index with request body
        call: elastic-stack.searchindexpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{index}/settings
      name: index-settings
      description: REST surface for index-_settings.
      operations:
      - method: GET
        name: getindexsettings
        description: Get index settings
        call: elastic-stack.getindexsettings
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: elastic-stack-mcp
    port: 9090
    transport: http
    description: MCP adapter for Elasticsearch API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: bulk-operations
      description: Bulk operations
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: elastic-stack.bulkoperations
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-cluster-health
      description: Get cluster health
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: elastic-stack.getclusterhealth
      outputParameters:
      - type: object
        mapping: $.
    - name: create-index
      description: Create index
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: elastic-stack.createindex
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-index
      description: Delete index
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: elastic-stack.deleteindex
      outputParameters:
      - type: object
        mapping: $.
    - name: get-document-id
      description: Get document by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: elastic-stack.getdocument
      outputParameters:
      - type: object
        mapping: $.
    - name: index-document-explicit-id
      description: Index document with explicit ID
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: elastic-stack.putdocument
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-document-id
      description: Delete document by ID
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: elastic-stack.deletedocument
      outputParameters:
      - type: object
        mapping: $.
    - name: search-documents-index
      description: Search documents in an index
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: elastic-stack.searchindexget
      outputParameters:
      - type: object
        mapping: $.
    - name: search-documents-index-request-body
      description: Search documents in an index with request body
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: elastic-stack.searchindexpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-index-settings
      description: Get index settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: elastic-stack.getindexsettings
      outputParameters:
      - type: object
        mapping: $.
